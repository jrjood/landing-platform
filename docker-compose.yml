version: '3.8'

services:
  # --- Database (always included) ---
  mysql:
    image: mysql:8.0
    container_name: landing-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-landing_platform}
      MYSQL_USER: ${DB_USER:-landing_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-landing_pass}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 5s
      retries: 10

  # --- Development API (hot-reload) — default via `docker compose up` ---
  api-dev:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: landing-platform-api-dev
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-landing_user}
      DB_PASSWORD: ${DB_PASSWORD:-landing_pass}
      DB_NAME: ${DB_NAME:-landing_platform}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - '5000:5000'
    volumes:
      - ./apps/api/src:/app/src
      - ./uploads:/app/uploads

  # --- Development Web (Vite dev server) — default via `docker compose up` ---
  web-dev:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: landing-platform-web-dev
    restart: unless-stopped
    depends_on:
      - api-dev
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public

  # --- Production (multi-stage, single API container serving API + static) ---
  api-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: landing-platform-api-prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-landing_user}
      DB_PASSWORD: ${DB_PASSWORD:-landing_pass}
      DB_NAME: ${DB_NAME:-landing_platform}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-https://wealthholding-eg.com}
      CORS_ROOT_DOMAIN: ${CORS_ROOT_DOMAIN:-wealthholding-eg.com}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BASE_URL: ${S3_BASE_URL:-}
    ports:
      - '5000:5000'
    volumes:
      - uploads_data:/app/uploads
    profiles:
      - prod

volumes:
  mysql_data:
  uploads_data:
